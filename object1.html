<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRIAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #d4af37;
  color: #222;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  cursor: pointer;
  transition: background 0.2s linear;
}

h1 {
  letter-spacing: 0.1em;
  font-size: 1.8rem;
  margin: 0;
}

.hint {
  margin-top: 20px;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>
</head>

<body>

<div>
  <h1>TRIAL</h1>
  <div class="hint" id="hint">tap</div>
</div>

<audio id="audio" crossorigin="anonymous">
  <source src="object1.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const hint = document.getElementById("hint");

// --- AUDIO ANALYSIS SETUP ---
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const source = ctx.createMediaElementSource(audio);
const analyser = ctx.createAnalyser();

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 256;
const dataArray = new Uint8Array(analyser.frequencyBinCount);

// --- AUTOPLAY ATTEMPT ---
window.addEventListener("load", () => {
  audio.play().catch(() => {});
});

// --- TAP BEHAVIOUR ---
document.body.addEventListener("click", async () => {
  await ctx.resume(); // required for iPhone

  if (!audio.paused && !audio.ended) {
    audio.pause();
  } else if (audio.ended) {
    audio.currentTime = 0;
    audio.play();
  } else {
    audio.play();
  }
});

// --- HALO ANIMATION ---
function animate() {
  requestAnimationFrame(animate);

  analyser.getByteFrequencyData(dataArray);

  // Get average volume
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    sum += dataArray[i];
  }
  let avg = sum / dataArray.length;

  // Map volume to glow intensity
  let intensity = avg / 255;

  // Subtle scaling
  let glowSize = 60 + intensity * 20;

  document.body.style.background = `
    radial-gradient(circle, 
      rgba(245,215,110,${0.6 + intensity * 0.4}) 0%, 
      #d4af37 ${glowSize}%)
  `;
}

animate();

// --- HINT FEEDBACK ---
audio.addEventListener("play", () => {
  hint.style.opacity = 0.3;
});

audio.addEventListener("pause", () => {
  hint.style.opacity = 1;
});

audio.addEventListener("ended", () => {
  hint.style.opacity = 1;
});
</script>

</body>
</html>
