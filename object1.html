<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRIAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #d4af37; /* rich gold */
  color: #222;          /* black text */
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  cursor: pointer;
}

h1 {
  letter-spacing: 0.1em;
  font-size: 1.8rem;
  margin: 0;
}

.hint {
  margin-top: 20px;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>
</head>

<body>

<div>
  <h1>TRIAL</h1>
  <div class="hint" id="hint">tap</div>
</div>

<audio id="audio">
  <source src="object1.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const hint = document.getElementById("hint");

// Try autoplay on page load
window.addEventListener("load", () => {
  audio.play().catch(() => {
    // Autoplay blocked — user will tap
  });
});

// Tap anywhere to play, but only if audio is paused
document.body.addEventListener("click", () => {
  if (audio.paused) {
    audio.currentTime = 0; // start from beginning
    audio.play();
  }
});

// Update hint opacity based on audio state
audio.addEventListener("play", () => {
  hint.style.opacity = 0.5;
});

audio.addEventListener("ended", () => {
  hint.style.opacity = 1;
});
</script>

</body>
</html>
