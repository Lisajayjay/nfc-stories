<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRIAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #d4af37;
  color: #222;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  cursor: pointer;
  transition: background 1s ease;
}

/* Halo effect */
body.playing {
  background: radial-gradient(circle, #f5d76e 0%, #d4af37 60%);
}

h1 {
  letter-spacing: 0.1em;
  font-size: 1.8rem;
  margin: 0;
}

.hint {
  margin-top: 20px;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>
</head>

<body>

<div>
  <h1>TRIAL</h1>
  <div class="hint" id="hint">tap</div>
</div>

<audio id="audio">
  <source src="object1.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const hint = document.getElementById("hint");

// Try autoplay
window.addEventListener("load", () => {
  audio.play().catch(() => {});
});

// Tap behaviour
document.body.addEventListener("click", () => {
  if (!audio.paused && !audio.ended) {
    // If playing → pause
    audio.pause();
  } else if (audio.ended) {
    // If finished → restart
    audio.currentTime = 0;
    audio.play();
  } else {
    // If paused → resume
    audio.play();
  }
});

// Visual + hint feedback
audio.addEventListener("play", () => {
  document.body.classList.add("playing");
  hint.style.opacity = 0.3;
});

audio.addEventListener("pause", () => {
  document.body.classList.remove("playing");
  hint.style.opacity = 1;
});

audio.addEventListener("ended", () => {
  document.body.classList.remove("playing");
  hint.style.opacity = 1;
});
</script>

</body>
</html>
