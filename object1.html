<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRIAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
h1 {
  opacity: 0;
  animation: fade 2s forwards;
}

@keyframes fade {
  to { opacity: 1; }
}
  body {
  margin: 0;
  background: #c9a227; /* gold */
  color: #222;
  font-family: sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;

  cursor: pointer;
}

h1 {
  letter-spacing: 0.1em;
  font-size: 1.8rem;
}

.hint {
  margin-top: 20px;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>
</head>

<body>

<div>
  <h1>TRIAL</h1>
  <div class="hint">tap</div>
</div>

<audio id="audio">
  <source src="object1.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");

// Try autoplay
window.addEventListener("load", () => {
  audio.play().catch(() => {
    // silently fail — user will tap
  });
});

// Tap anywhere to play
document.body.addEventListener("click", () => {
  audio.play();
}, { once: true });

</script>

</body>
</html>
